<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Accounts Monitoring Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3347;
  --text: #e4e6f0;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --red: #ff6b6b;
  --orange: #ffa502;
  --green: #26de81;
  --blue: #4ecdc4;
  --roblox: #e74c3c;
  --fortnite: #9b59b6;
  --minecraft: #27ae60;
  --steam: #2980b9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; line-height: 1.5; }
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

.header {
  background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header h1 span { color: var(--roblox); }
.header-meta { color: var(--text-dim); font-size: 12px; text-align: right; }

.nav {
  display: flex; gap: 4px; padding: 12px 32px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.nav button {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.nav button:hover { border-color: var(--accent); color: var(--text); }
.nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

.section { display: none; }
.section.active { display: block; }

/* KPI Cards */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.kpi-card.roblox::before { background: var(--roblox); }
.kpi-card.fortnite::before { background: var(--fortnite); }
.kpi-card.minecraft::before { background: var(--minecraft); }
.kpi-card.steam::before { background: var(--steam); }
.kpi-card.primary::before { background: var(--accent); }
.kpi-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; }
.kpi-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.chart-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
}
.chart-row.full { grid-template-columns: 1fr; }
.chart-row.triple { grid-template-columns: 1fr 1fr 1fr; }

.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px;
}
.chart-card h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text);
}
.chart-card canvas { max-height: 340px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border);
     color: var(--text-dim); font-weight: 600; text-transform: uppercase; font-size: 11px;
     letter-spacing: 0.5px; }
td { padding: 12px; border-bottom: 1px solid var(--border); }
tr:hover { background: var(--surface2); }

.table-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden;
}

/* Filters */
.filters {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
}
.filters label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
.filters input,
.filters select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 13px;
}
.filters input::placeholder { color: var(--text-dim); }

/* Platform tags */
.platform-tag {
  display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  text-transform: uppercase;
}
.platform-tag.Roblox { background: #e74c3c33; color: var(--roblox); }
.platform-tag.Fortnite { background: #9b59b633; color: var(--fortnite); }
.platform-tag.Minecraft { background: #27ae6033; color: var(--minecraft); }
.platform-tag.Steam { background: #2980b933; color: var(--steam); }

/* Category tags */
.category-tag {
  display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  text-transform: uppercase;
}
.category-tag.items-currency { background: #4ecdc433; color: var(--blue); }
.category-tag.age-verified { background: #26de8133; color: var(--green); }
.category-tag.og-veteran { background: #ffa50233; color: var(--orange); }
.category-tag.general { background: #8b8fa333; color: var(--text-dim); }

.view-link {
  display: inline-block; padding: 4px 10px; border-radius: 6px; background: #4ecdc433;
  color: var(--blue); font-size: 12px; font-weight: 600; cursor: pointer;
}
.view-link:hover { background: #4ecdc466; text-decoration: underline; }

/* Platform detail cards */
.platform-detail {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 20px;
}
.platform-detail h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 12px;
}

.source-detail {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 20px;
}
.source-detail h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 12px;
}

.metric-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin: 12px 0;
}
.metric-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px;
}
.metric-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 18px; font-weight: 700; margin-top: 4px; }

.links-list {
  display: flex; flex-direction: column; gap: 8px;
}
.link-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
}

h2 { margin-bottom: 20px; font-size: 18px; font-weight: 600; }
h4 { margin-top: 16px; margin-bottom: 12px; font-size: 14px; }

@media (max-width: 900px) {
  .chart-row { grid-template-columns: 1fr; }
  .chart-row.triple { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .filters { flex-direction: column; align-items: stretch; }
  .filters input, .filters select { width: 100%; }
  .header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .header-meta { text-align: left; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>Roblox</span> Accounts Monitoring Dashboard</h1>
  <div class="header-meta">
    <div id="last-updated">Last Updated: Loading...</div>
    <div>Sources: Eldorado.gg, U7Buy, eBay</div>
  </div>
</div>

<div class="nav" id="nav">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="listings">Live Listings</button>
  <button data-tab="platforms">By Platform</button>
  <button data-tab="sources">Sources</button>
</div>

<div class="container">

<!-- ========== OVERVIEW ========== -->
<div class="section active" id="sec-overview">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="chart-row">
    <div class="chart-card"><h3>Listings by Platform & Source</h3><canvas id="chartListingsByPlatformSource"></canvas></div>
    <div class="chart-card"><h3>Category Distribution</h3><canvas id="chartCategoryDist"></canvas></div>
  </div>
</div>

<!-- ========== LIVE LISTINGS ========== -->
<div class="section" id="sec-listings">
  <h2>Live Listings</h2>

  <div class="filters">
    <div>
      <label>Search:</label>
      <input type="text" id="searchInput" placeholder="Search by title, seller, platform...">
    </div>
    <div>
      <label>Platform:</label>
      <select id="filterPlatform">
        <option value="">All Platforms</option>
        <option value="Roblox">Roblox</option>
        <option value="Fortnite">Fortnite</option>
        <option value="Minecraft">Minecraft</option>
        <option value="Steam">Steam</option>
      </select>
    </div>
    <div>
      <label>Source:</label>
      <select id="filterSource">
        <option value="">All Sources</option>
        <option value="Eldorado.gg">Eldorado.gg</option>
        <option value="U7Buy">U7Buy</option>
        <option value="eBay">eBay</option>
      </select>
    </div>
    <div>
      <label>Category:</label>
      <select id="filterCategory">
        <option value="">All Categories</option>
        <option value="Items / Currency">Items / Currency</option>
        <option value="Age Verified">Age Verified</option>
        <option value="OG / Veteran Account">OG / Veteran Account</option>
        <option value="General">General</option>
      </select>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table id="listingsTable">
        <thead>
          <tr>
            <th style="width: 12%;">Platform</th>
            <th style="width: 12%;">Source</th>
            <th style="width: 25%;">Title</th>
            <th style="width: 10%;">Price (USD)</th>
            <th style="width: 12%;">Seller</th>
            <th style="width: 10%;">Rating</th>
            <th style="width: 15%;">Categories</th>
            <th style="width: 14%;">Action</th>
          </tr>
        </thead>
        <tbody id="listingsTableBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ========== BY PLATFORM ========== -->
<div class="section" id="sec-platforms">
  <h2>By Platform</h2>
  <div id="platformsContainer"></div>
</div>

<!-- ========== SOURCES ========== -->
<div class="section" id="sec-sources">
  <h2>Sources</h2>
  <div id="sourcesContainer"></div>
</div>

</div>

<script>
// Data loaded via fetch
let dashboardData = null;

// Platform colors
const platformColors = {
  'Roblox': '#e74c3c',
  'Fortnite': '#9b59b6',
  'Minecraft': '#27ae60',
  'Steam': '#2980b9'
};

const categoryColors = {
  'Items / Currency': '#4ecdc4',
  'Age Verified': '#26de81',
  'OG / Veteran Account': '#ffa502',
  'General': '#8b8fa3'
};

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  // Fetch data from JSON file instead of using embedded data
  fetch('dashboard_data.json')
    .then(response => {
      if (!response.ok) throw new Error('Failed to load data: ' + response.status);
      return response.json();
    })
    .then(data => {
      dashboardData = data;
      updateLastUpdated();
      initializeNavigation();
      renderOverview();
      renderListings();
      renderPlatforms();
      renderSources();
      setupFilters();
    })
    .catch(error => {
      console.error('Error loading dashboard data:', error);
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'Error loading data. Please refresh.';
    });
});

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  if (!el || !dashboardData || !dashboardData.metadata) return;
  const dateStr = dashboardData.metadata.scrape_date || dashboardData.metadata.generated_at;
  if (dateStr) {
    // Parse YYYY-MM-DD without timezone shift by splitting manually
    const parts = dateStr.substring(0, 10).split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    el.textContent = 'Last Updated: ' + formatted;
  }
}

// Navigation
function initializeNavigation() {
  const navButtons = document.querySelectorAll('.nav button');
  navButtons.forEach(button => {
    button.addEventListener('click', function() {
      const tab = this.dataset.tab;
      showSection(tab);
      navButtons.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });
}

function showSection(sectionId) {
  const sections = document.querySelectorAll('.section');
  sections.forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + sectionId).classList.add('active');
}

// Overview Section
function renderOverview() {
  const data = dashboardData;

  // KPI Cards
  const kpiHtml = `
    <div class="kpi-card primary">
      <div class="kpi-label">Total Listings Found</div>
      <div class="kpi-value">${data.metadata.total_listings_found.toLocaleString()}</div>
      <div class="kpi-sub">Across all marketplaces</div>
    </div>
    <div class="kpi-card primary">
      <div class="kpi-label">Total Sources</div>
      <div class="kpi-value">${data.metadata.sources.length}</div>
      <div class="kpi-sub">${data.metadata.sources.join(', ')}</div>
    </div>
    <div class="kpi-card primary">
      <div class="kpi-label">Platforms Tracked</div>
      <div class="kpi-value">${data.metadata.platforms.length}</div>
      <div class="kpi-sub">Roblox, Fortnite, Minecraft, Steam</div>
    </div>
    <div class="kpi-card primary">
      <div class="kpi-label">Scraped Listings</div>
      <div class="kpi-value">${data.metadata.total_listings_scraped}</div>
      <div class="kpi-sub">With full details</div>
    </div>
  `;

  document.getElementById('kpiGrid').innerHTML = kpiHtml;

  // Chart: Listings by Platform & Source
  const platformSourceData = {};
  data.metadata.platforms.forEach(p => {
    platformSourceData[p] = {
      'Eldorado.gg': data.platform_summary[p].sources['Eldorado.gg'].scraped_count,
      'U7Buy': data.platform_summary[p].sources['U7Buy'].scraped_count,
      'eBay': data.platform_summary[p].sources['eBay'].scraped_count
    };
  });

  const ctx1 = document.getElementById('chartListingsByPlatformSource').getContext('2d');
  new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: data.metadata.platforms,
      datasets: [
        {
          label: 'Eldorado.gg',
          data: data.metadata.platforms.map(p => platformSourceData[p]['Eldorado.gg']),
          backgroundColor: 'rgba(108, 92, 231, 0.8)',
          borderColor: '#6c5ce7',
          borderWidth: 1
        },
        {
          label: 'U7Buy',
          data: data.metadata.platforms.map(p => platformSourceData[p]['U7Buy']),
          backgroundColor: 'rgba(0, 206, 201, 0.8)',
          borderColor: '#00cec9',
          borderWidth: 1
        },
        {
          label: 'eBay',
          data: data.metadata.platforms.map(p => platformSourceData[p]['eBay']),
          backgroundColor: 'rgba(255, 107, 107, 0.8)',
          borderColor: '#ff6b6b',
          borderWidth: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: '#e4e6f0', font: { size: 12 } } }
      },
      scales: {
        y: {
          ticks: { color: '#8b8fa3' },
          grid: { color: '#2e3347' },
          beginAtZero: true
        },
        x: {
          ticks: { color: '#8b8fa3' },
          grid: { color: '#2e3347' }
        }
      }
    }
  });

  // Chart: Category Distribution
  const categoryLabels = Object.keys(data.category_summary);
  const categoryData = Object.values(data.category_summary).map(c => c.count);
  const categoryBgColors = categoryLabels.map(c => categoryColors[c]);

  const ctx2 = document.getElementById('chartCategoryDist').getContext('2d');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: categoryLabels,
      datasets: [{
        data: categoryData,
        backgroundColor: categoryBgColors,
        borderColor: '#1a1d27',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: '#e4e6f0', font: { size: 12 } } }
      }
    }
  });
}

// Live Listings Section
function renderListings() {
  const tbody = document.getElementById('listingsTableBody');
  tbody.innerHTML = '';

  dashboardData.listings.forEach(listing => {
    const categories = listing.categories.map(cat => {
      const key = cat === 'OG / Veteran Account' ? 'og-veteran' :
                  cat === 'Items / Currency' ? 'items-currency' :
                  cat === 'Age Verified' ? 'age-verified' : 'general';
      return `<span class="category-tag ${key}">${cat}</span>`;
    }).join(' ');

    const row = document.createElement('tr');
    row.dataset.platform = listing.platform;
    row.dataset.source = listing.source;
    row.dataset.category = listing.categories[0] || '';
    row.dataset.searchText = `${listing.title} ${listing.seller} ${listing.platform}`.toLowerCase();

    row.innerHTML = `
      <td><span class="platform-tag ${listing.platform}">${listing.platform}</span></td>
      <td>${listing.source}</td>
      <td><strong>${listing.title}</strong></td>
      <td>$${listing.price_usd.toFixed(2)}</td>
      <td>${listing.seller}</td>
      <td>${listing.rating}</td>
      <td>${categories}</td>
      <td><a href="${listing.url}" target="_blank" class="view-link">View Listing →</a></td>
    `;

    tbody.appendChild(row);
  });
}

// Setup Filters
function setupFilters() {
  const searchInput = document.getElementById('searchInput');
  const filterPlatform = document.getElementById('filterPlatform');
  const filterSource = document.getElementById('filterSource');
  const filterCategory = document.getElementById('filterCategory');

  function applyFilters() {
    const searchTerm = searchInput.value.toLowerCase();
    const platformVal = filterPlatform.value;
    const sourceVal = filterSource.value;
    const categoryVal = filterCategory.value;

    const rows = document.querySelectorAll('#listingsTableBody tr');
    rows.forEach(row => {
      let show = true;

      if (searchTerm && !row.dataset.searchText.includes(searchTerm)) show = false;
      if (platformVal && row.dataset.platform !== platformVal) show = false;
      if (sourceVal && row.dataset.source !== sourceVal) show = false;
      if (categoryVal && row.dataset.category !== categoryVal) show = false;

      row.style.display = show ? '' : 'none';
    });
  }

  searchInput.addEventListener('input', applyFilters);
  filterPlatform.addEventListener('change', applyFilters);
  filterSource.addEventListener('change', applyFilters);
  filterCategory.addEventListener('change', applyFilters);
}

// By Platform Section
function renderPlatforms() {
  const container = document.getElementById('platformsContainer');
  const data = dashboardData;

  let html = '';

  data.metadata.platforms.forEach(platform => {
    const summary = data.platform_summary[platform];
    const categories = summary.categories;

    html += `
      <div class="platform-detail">
        <h3 style="color: ${platformColors[platform]}">${platform}</h3>

        <div class="metric-row">
          <div class="metric-item">
            <div class="metric-label">Total Listings</div>
            <div class="metric-value">${summary.total_listings_across_sources.toLocaleString()}</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">Avg Price (USD)</div>
            <div class="metric-value">$${summary.avg_price_usd.toFixed(2)}</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">Price Range</div>
            <div class="metric-value">$${summary.price_min.toFixed(2)} - $${summary.price_max.toFixed(2)}</div>
          </div>
        </div>

        <h4>Categories</h4>
        <div class="metric-row" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
          ${Object.entries(categories).map(([cat, count]) => {
            const key = cat === 'OG / Veteran Account' ? 'og-veteran' :
                        cat === 'Items / Currency' ? 'items-currency' :
                        cat === 'Age Verified' ? 'age-verified' : 'general';
            return `
              <div class="metric-item">
                <div class="metric-label">${cat}</div>
                <div class="metric-value">${count}</div>
              </div>
            `;
          }).join('')}
        </div>

        <h4>Available on Marketplaces</h4>
        <div class="links-list">
          ${data.metadata.sources.map(source => {
            const sourceData = summary.sources[source];
            return `
              <div class="link-item">
                <strong>${source}</strong>
                <span style="color: var(--text-dim); font-size: 12px;">${sourceData.total_on_site.toLocaleString()} total</span>
                <a href="${sourceData.search_url}" target="_blank" style="margin-left: auto;">Visit →</a>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// Sources Section
function renderSources() {
  const container = document.getElementById('sourcesContainer');
  const data = dashboardData;

  let html = '';

  Object.entries(data.source_summary).forEach(([source, summary]) => {
    html += `
      <div class="source-detail">
        <h3>${source}</h3>

        <div class="metric-row">
          <div class="metric-item">
            <div class="metric-label">Total Listings</div>
            <div class="metric-value">${summary.total_listings.toLocaleString()}</div>
          </div>
        </div>

        <h4>Available Platforms</h4>
        <div class="links-list">
          ${summary.platforms.map(platform => {
            const searchUrl = data.search_urls[platform][source];
            return `
              <div class="link-item">
                <span class="platform-tag ${platform}">${platform}</span>
                <a href="${searchUrl}" target="_blank" style="margin-left: auto;">Browse on ${source} →</a>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}
</script>

</body>
</html>

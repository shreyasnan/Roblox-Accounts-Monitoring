name: Daily Marketplace Scrape & Deploy

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Also allows manual runs from the GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml requests
          playwright install chromium --with-deps

      - name: Verify Playwright
        run: python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"

      - name: Run scraper
        run: python scrape_listings.py --verbose

      - name: Embed fresh data into dashboard HTML
        run: |
          python3 -c "
          import json, re
          with open('dashboard_data.json') as f:
              data = json.dumps(json.load(f))
          with open('index.html') as f:
              html = f.read()
          replacement = 'const dashboardData = ' + data + ';'
          html = re.sub(
              r'const dashboardData = \{.*?\n\};\n\n// Platform colors',
              lambda m: replacement + '\n\n// Platform colors',
              html,
              count=1,
              flags=re.DOTALL
          )
          with open('index.html', 'w') as f:
              f.write(html)
          print('Dashboard HTML updated with fresh data')
          "

      - name: Commit updated data and HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json scrape_history/ index.html scraper.log
          git diff --cached --quiet || git commit -m "chore: daily scrape $(date -u '+%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
